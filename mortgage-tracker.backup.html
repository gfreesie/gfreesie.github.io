<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pipeline Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body { background: #060b14; font-family: 'Inter', 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.2); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,200,255,0.4); }
  select option { background: #0a1020; color: #c8dff5; }
  input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.5) sepia(1) saturate(2) hue-rotate(175deg); cursor: pointer; }
  @keyframes pulse-glow {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes modal-in {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
  }
  .card-enter  { animation: slide-in 0.18s ease-out; }
  .modal-panel { animation: modal-in 0.18s ease-out; }
  .pulse       { animation: pulse-glow 2s ease-in-out infinite; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ── PIPELINE STAGES ─────────────────────────────────────
const STAGES = [
  { id: "app-docs",       label: "App / Docs",           short: "AD",  color: "#6d28d9", glow: "rgba(109,40,217,0.35)" },
  { id: "processing",     label: "Processing",            short: "PRO", color: "#0891b2", glow: "rgba(8,145,178,0.35)"  },
  { id: "uw-conditional", label: "UW / Conditional",      short: "UWC", color: "#d97706", glow: "rgba(217,119,6,0.35)"  },
  { id: "ctc",            label: "Clear to Close",        short: "CTC", color: "#059669", glow: "rgba(5,150,105,0.35)"  },
  { id: "funded",         label: "Funded",                short: "FND", color: "#16a34a", glow: "rgba(22,163,74,0.45)"  },
];

const LOAN_TYPES = ["Conventional", "FHA", "VA", "USDA", "Jumbo", "HELOC", "Non-QM"];

// ── SAMPLE DATA ─────────────────────────────────────────
const INITIAL = [
  { id:1, name:"Marcus & Elena Rodriguez", loanAmount:485000, loanType:"Conventional", propertyAddress:"4821 Sunset Blvd, Austin TX 78745",      rateLocked:true,  stage:"uw-conditional", closingDate:"2026-05-15", lo:"Sarah K." },
  { id:2, name:"James Whitfield",           loanAmount:320000, loanType:"FHA",          propertyAddress:"112 Oak Terrace, Dallas TX 75201",         rateLocked:false, stage:"processing",     closingDate:"2026-05-28", lo:"Mike R."  },
  { id:3, name:"Sarah & Tom Chen",          loanAmount:750000, loanType:"Jumbo",         propertyAddress:"9 Lakeview Dr, Houston TX 77002",          rateLocked:true,  stage:"ctc",            closingDate:"2026-04-22", lo:"Sarah K." },
  { id:4, name:"DeShawn Williams",          loanAmount:265000, loanType:"VA",            propertyAddress:"5503 Maple Ave, San Antonio TX 78201",     rateLocked:false, stage:"app-docs",       closingDate:"",           lo:"Alex T."  },
  { id:5, name:"Priya Nair",                loanAmount:410000, loanType:"Conventional",  propertyAddress:"2201 Cedar Park Ln, Round Rock TX 78664",  rateLocked:true,  stage:"app-docs",       closingDate:"2026-06-10", lo:"Mike R."  },
  { id:6, name:"Robert & Dana Solis",       loanAmount:595000, loanType:"Jumbo",         propertyAddress:"771 Hillview Ct, Frisco TX 75034",         rateLocked:true,  stage:"uw-conditional", closingDate:"2026-05-03", lo:"Alex T."  },
  { id:7, name:"Keisha Monroe",             loanAmount:198000, loanType:"FHA",           propertyAddress:"330 Birchwood Pl, Plano TX 75023",         rateLocked:false, stage:"funded",         closingDate:"2026-04-10", lo:"Sarah K." },
];

// ── HELPERS ─────────────────────────────────────────────
const fmt     = n => "$" + Number(n).toLocaleString();
const fmtDate = d => d ? new Date(d + "T00:00:00").toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" }) : "—";
const daysUntil = d => {
  if (!d) return null;
  return Math.ceil((new Date(d + "T00:00:00") - new Date()) / 86400000);
};

// ── THEME ───────────────────────────────────────────────
const C = {
  bg:      "#060b14",
  panel:   "#09101f",
  card:    "#0c1526",
  cardHov: "#0f1c32",
  border:  "rgba(0,200,255,0.09)",
  borderHi:"rgba(0,200,255,0.28)",
  accent:  "#00c8ff",
  accentDim:"rgba(0,200,255,0.12)",
  text:    "#ddeeff",
  textSub: "#8aaec8",
  textDim: "#3d5a72",
  red:     "#ef4444",
  green:   "#10b981",
  yellow:  "#f59e0b",
};

const inputSt = {
  width:"100%", padding:"9px 12px",
  background:"rgba(255,255,255,0.04)",
  border:"1px solid rgba(0,200,255,0.14)",
  borderRadius:7, color:"#c8dff5",
  fontSize:13, outline:"none", fontFamily:"inherit",
};

// ── APP ─────────────────────────────────────────────────
export default function App() {
  const [clients, setClients] = useState(INITIAL);
  const [detail,  setDetail]  = useState(null);
  const [adding,  setAdding]  = useState(false);
  const [dragId,  setDragId]  = useState(null);
  const [dragOver,setDragOver]= useState(null);
  const [search,  setSearch]  = useState("");
  const [filterLO,setFilterLO]= useState("All");

  const allLOs   = ["All", ...new Set(clients.map(c => c.lo).filter(Boolean))];
  const filtered = clients.filter(c => {
    const q      = search.toLowerCase();
    const matchQ = !q || c.name.toLowerCase().includes(q) || c.propertyAddress.toLowerCase().includes(q);
    const matchLO= filterLO === "All" || c.lo === filterLO;
    return matchQ && matchLO;
  });

  const move = (id, dir) => setClients(prev => prev.map(c => {
    if (c.id !== id) return c;
    const idx = STAGES.findIndex(s => s.id === c.stage);
    const ni  = dir === "fwd" ? Math.min(idx+1, STAGES.length-1) : Math.max(idx-1, 0);
    return { ...c, stage: STAGES[ni].id };
  }));

  const del = id => { setClients(p => p.filter(c => c.id !== id)); setDetail(null); };

  const add = data => {
    setClients(p => [...p, { ...data, id: Date.now(), loanAmount: Number(data.loanAmount) }]);
    setAdding(false);
  };

  const onDragStart = id  => setDragId(id);
  const onDragOver  = (e, sid) => { e.preventDefault(); setDragOver(sid); };
  const onDrop      = sid => {
    if (dragId) setClients(p => p.map(c => c.id === dragId ? { ...c, stage: sid } : c));
    setDragId(null); setDragOver(null);
  };
  const onDragEnd   = ()  => { setDragId(null); setDragOver(null); };

  const totalVol = clients.reduce((s,c) => s + c.loanAmount, 0);
  const locked   = clients.filter(c => c.rateLocked).length;

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", overflow:"hidden", background:C.bg }}>

      {/* ── HEADER ── */}
      <header style={{
        display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"0 24px", height:56, flexShrink:0,
        background:"rgba(9,16,31,0.97)",
        borderBottom:`1px solid ${C.border}`,
        backdropFilter:"blur(20px)", position:"relative", zIndex:10,
      }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div className="pulse" style={{ width:7, height:7, borderRadius:"50%", background:C.accent, boxShadow:`0 0 10px ${C.accent}` }} />
          <span style={{ fontSize:12, fontWeight:800, letterSpacing:"0.18em", textTransform:"uppercase", color:C.accent }}>Pipeline</span>
          <span style={{ fontSize:12, color:C.textDim, letterSpacing:"0.05em" }}>// Mortgage Tracker</span>
        </div>

        <div style={{ display:"flex", gap:24, alignItems:"center" }}>
          <Stat label="ACTIVE FILES" value={clients.length} />
          <Divider />
          <Stat label="TOTAL VOLUME"  value={fmt(totalVol)} color={C.accent} />
          <Divider />
          <Stat label="RATE LOCKED"   value={`${locked} / ${clients.length}`} color={C.green} />
        </div>

        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          <input
            value={search} onChange={e => setSearch(e.target.value)}
            placeholder="Search files…"
            style={{ ...inputSt, width:160, fontSize:11, padding:"6px 10px" }}
          />
          <select value={filterLO} onChange={e => setFilterLO(e.target.value)}
            style={{ ...inputSt, width:"auto", fontSize:11, padding:"6px 10px", cursor:"pointer" }}>
            {allLOs.map(lo => <option key={lo}>{lo}</option>)}
          </select>
          <AddBtn onClick={() => setAdding(true)} />
        </div>
      </header>

      {/* ── BOARD ── */}
      <div style={{
        display:"flex", gap:12, padding:"16px",
        overflowX:"auto", overflowY:"hidden",
        flex:1, alignItems:"flex-start",
      }}>
        {STAGES.map(stage => {
          const cols  = filtered.filter(c => c.stage === stage.id);
          const isOver= dragOver === stage.id;
          const vol   = cols.reduce((s,c) => s+c.loanAmount, 0);

          return (
            <div key={stage.id}
              onDragOver={e => onDragOver(e, stage.id)}
              onDrop={() => onDrop(stage.id)}
              style={{
                flex:"1 1 0", minWidth:200, maxWidth:300,
                display:"flex", flexDirection:"column",
                background: isOver ? "rgba(0,200,255,0.04)" : C.panel,
                border:`1px solid ${isOver ? C.borderHi : C.border}`,
                borderTop:`2px solid ${stage.color}`,
                borderRadius:10,
                padding:"13px 11px",
                transition:"all 0.15s",
                boxShadow: isOver ? `0 0 28px ${stage.glow}` : "none",
                maxHeight:"100%", overflow:"hidden",
              }}
            >
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10, flexShrink:0 }}>
                <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                  <div style={{ width:5, height:5, borderRadius:"50%", background:stage.color, boxShadow:`0 0 7px ${stage.color}` }} />
                  <span style={{ fontSize:10, fontWeight:800, letterSpacing:"0.13em", textTransform:"uppercase", color:stage.color }}>{stage.label}</span>
                </div>
                <span style={{ fontSize:10, fontWeight:700, background:"rgba(255,255,255,0.04)", color:C.textDim, padding:"2px 8px", borderRadius:10 }}>{cols.length}</span>
              </div>

              {cols.length > 0 && (
                <div style={{ fontSize:10, color:C.textDim, marginBottom:10, flexShrink:0 }}>{fmt(vol)} vol</div>
              )}

              <div style={{ display:"flex", flexDirection:"column", gap:7, overflowY:"auto", flex:1, paddingRight:2 }}>
                {cols.map(client => (
                  <ClientCard
                    key={client.id}
                    client={client}
                    stage={stage}
                    onOpen={() => setDetail(client)}
                    onMove={move}
                    onDragStart={onDragStart}
                    onDragEnd={onDragEnd}
                    isDragging={dragId === client.id}
                  />
                ))}
                {cols.length === 0 && (
                  <div style={{ textAlign:"center", padding:"28px 0", color:C.textDim, fontSize:11, letterSpacing:"0.06em" }}>— empty —</div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {detail && (
        <Overlay onClose={() => setDetail(null)}>
          <DetailPanel client={detail} onMove={dir => { move(detail.id, dir); setDetail(null); }} onDelete={() => del(detail.id)} onClose={() => setDetail(null)} />
        </Overlay>
      )}
      {adding && (
        <Overlay onClose={() => setAdding(false)}>
          <AddPanel onAdd={add} onClose={() => setAdding(false)} />
        </Overlay>
      )}
    </div>
  );
}

function Divider() {
  return <div style={{ width:1, height:20, background:C.border }} />;
}

function Stat({ label, value, color }) {
  return (
    <div style={{ textAlign:"center" }}>
      <div style={{ fontSize:9, color:C.textDim, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:2 }}>{label}</div>
      <div style={{ fontSize:13, fontWeight:800, color:color||C.text, letterSpacing:"-0.01em" }}>{value}</div>
    </div>
  );
}

function AddBtn({ onClick }) {
  const [hov, setHov] = useState(false);
  return (
    <button onClick={onClick}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        padding:"7px 16px", borderRadius:6, fontSize:11, fontWeight:700,
        letterSpacing:"0.1em", textTransform:"uppercase", cursor:"pointer",
        background: hov ? "rgba(0,200,255,0.2)" : C.accentDim,
        border:"1px solid rgba(0,200,255,0.3)", color:C.accent,
        boxShadow: hov ? "0 0 16px rgba(0,200,255,0.2)" : "none",
        transition:"all 0.15s", whiteSpace:"nowrap",
      }}>+ New File</button>
  );
}

function ClientCard({ client, stage, onOpen, onMove, onDragStart, onDragEnd, isDragging }) {
  const [hov, setHov] = useState(false);
  const idx   = STAGES.findIndex(s => s.id === client.stage);
  const days  = daysUntil(client.closingDate);
  const urgent= days !== null && days <= 7;
  const soon  = days !== null && days <= 14 && days > 7;

  return (
    <div
      className="card-enter"
      draggable
      onDragStart={() => onDragStart(client.id)}
      onDragEnd={onDragEnd}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => setHov(false)}
      style={{
        background: hov ? C.cardHov : C.card,
        border:`1px solid ${hov ? C.borderHi : C.border}`,
        borderLeft:`2px solid ${stage.color}`,
        borderRadius:8, padding:"11px 11px 10px",
        cursor:"grab", userSelect:"none",
        opacity: isDragging ? 0.35 : 1,
        transition:"all 0.12s",
        boxShadow: hov ? `0 4px 20px rgba(0,0,0,0.4), 0 0 14px ${stage.glow}` : "0 2px 8px rgba(0,0,0,0.3)",
        position:"relative",
      }}
    >
      {urgent && <div className="pulse" style={{ position:"absolute", top:9, right:9, width:5, height:5, borderRadius:"50%", background:C.red, boxShadow:`0 0 6px ${C.red}` }} />}
      {soon && !urgent && <div style={{ position:"absolute", top:9, right:9, width:5, height:5, borderRadius:"50%", background:C.yellow }} />}

      <div onClick={onOpen} style={{ fontSize:12, fontWeight:600, color:"#c8dff5", marginBottom:5, lineHeight:1.35, paddingRight:12, cursor:"pointer" }}>
        {client.name}
      </div>

      <div style={{ fontSize:16, fontWeight:800, color:C.accent, marginBottom:6, letterSpacing:"-0.02em" }}>{fmt(client.loanAmount)}</div>

      <div style={{ display:"flex", flexWrap:"wrap", gap:4, marginBottom:6 }}>
        <Tag text={client.loanType} />
        <Tag
          text={client.rateLocked ? "🔒 LOCKED" : "⚡ FLOAT"}
          color={client.rateLocked ? C.green : C.yellow}
          bg={client.rateLocked ? "rgba(16,185,129,0.1)" : "rgba(245,158,11,0.1)"}
          border={client.rateLocked ? "rgba(16,185,129,0.25)" : "rgba(245,158,11,0.25)"}
        />
      </div>

      {client.propertyAddress && (
        <div style={{ fontSize:10, color:C.textDim, marginBottom:5, lineHeight:1.4, overflow:"hidden", whiteSpace:"nowrap", textOverflow:"ellipsis" }}>
          {client.propertyAddress}
        </div>
      )}

      {client.closingDate && (
        <div style={{ fontSize:10, marginBottom:7, display:"flex", gap:4 }}>
          <span style={{ color:C.textDim }}>Close:</span>
          <span style={{ color: urgent ? C.red : soon ? C.yellow : C.textSub, fontWeight:600 }}>
            {fmtDate(client.closingDate)}
            {days !== null && days >= 0 && <span style={{ color:C.textDim }}> ({days}d)</span>}
          </span>
        </div>
      )}

      {client.lo && <div style={{ fontSize:9, color:C.textDim, marginBottom:8 }}>LO: {client.lo}</div>}

      <div style={{ display:"flex", gap:4 }} onClick={e => e.stopPropagation()}>
        <MoveBtn label="←" active={idx > 0}                    onClick={() => onMove(client.id, "back")} />
        <MoveBtn label="→" active={idx < STAGES.length - 1}    onClick={() => onMove(client.id, "fwd")}  accent />
      </div>
    </div>
  );
}

function Tag({ text, color, bg, border }) {
  return (
    <span style={{
      fontSize:9, fontWeight:700, letterSpacing:"0.05em",
      padding:"2px 6px", borderRadius:4,
      color: color || C.textDim,
      background: bg || "rgba(255,255,255,0.04)",
      border:`1px solid ${border || "rgba(255,255,255,0.06)"}`,
    }}>{text}</span>
  );
}

function MoveBtn({ label, active, onClick, accent }) {
  const [hov, setHov] = useState(false);
  return (
    <button disabled={!active} onClick={onClick}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        flex:1, padding:"4px 0", fontSize:10, fontWeight:600,
        borderRadius:4, cursor: active ? "pointer" : "default",
        transition:"all 0.12s",
        color:    !active ? "transparent" : accent ? C.accent : C.textSub,
        background: !active ? "transparent" : hov ? (accent ? "rgba(0,200,255,0.2)" : "rgba(255,255,255,0.07)") : (accent ? "rgba(0,200,255,0.08)" : "rgba(255,255,255,0.03)"),
        border:   `1px solid ${!active ? "transparent" : accent ? "rgba(0,200,255,0.2)" : "rgba(255,255,255,0.07)"}`,
      }}>{label}</button>
  );
}

function Overlay({ children, onClose }) {
  return (
    <div onClick={onClose} style={{
      position:"fixed", inset:0, zIndex:50,
      background:"rgba(0,0,0,0.75)", backdropFilter:"blur(8px)",
      display:"flex", alignItems:"center", justifyContent:"center",
    }}>
      <div className="modal-panel" onClick={e => e.stopPropagation()} style={{
        background:"#090f1e",
        border:`1px solid ${C.borderHi}`,
        borderRadius:14, padding:28,
        minWidth:400, maxWidth:500, width:"90vw",
        boxShadow:`0 0 60px rgba(0,200,255,0.1), 0 24px 48px rgba(0,0,0,0.6)`,
        position:"relative", maxHeight:"90vh", overflowY:"auto",
      }}>
        {children}
      </div>
    </div>
  );
}

function DetailPanel({ client, onMove, onDelete, onClose }) {
  const stage    = STAGES.find(s => s.id === client.stage);
  const stageIdx = STAGES.findIndex(s => s.id === client.stage);
  const days     = daysUntil(client.closingDate);
  const urgent   = days !== null && days <= 7;
  const soon     = days !== null && days <= 14 && days > 7;

  return (
    <div>
      <button onClick={onClose} style={{ position:"absolute", top:14, right:16, background:"none", border:"none", color:C.textDim, cursor:"pointer", fontSize:22, lineHeight:1 }}>×</button>

      <div style={{ display:"flex", alignItems:"center", gap:7, marginBottom:18 }}>
        <div style={{ width:6, height:6, borderRadius:"50%", background:stage.color, boxShadow:`0 0 10px ${stage.color}` }} />
        <span style={{ fontSize:10, fontWeight:800, letterSpacing:"0.16em", textTransform:"uppercase", color:stage.color }}>{stage.label}</span>
      </div>

      <div style={{ fontSize:18, fontWeight:700, color:C.text, marginBottom:6, lineHeight:1.3 }}>{client.name}</div>
      <div style={{ fontSize:30, fontWeight:900, color:C.accent, marginBottom:20, letterSpacing:"-0.02em" }}>{fmt(client.loanAmount)}</div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14, marginBottom:22 }}>
        <InfoRow label="Loan Type"   value={client.loanType} />
        <InfoRow label="Rate Status" value={client.rateLocked ? "🔒  Locked" : "⚡  Floating"} color={client.rateLocked ? C.green : C.yellow} />
        <InfoRow label="Loan Officer" value={client.lo || "—"} />
        <InfoRow label="Closing Date"
          value={fmtDate(client.closingDate)}
          color={urgent ? C.red : soon ? C.yellow : undefined}
          note={days !== null && days >= 0 ? `${days} days` : undefined}
        />
        {client.propertyAddress && <InfoRow label="Property" value={client.propertyAddress} span />}
      </div>

      <div style={{ marginBottom:22 }}>
        <div style={{ fontSize:9, color:C.textDim, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:8 }}>
          Pipeline Progress ({stageIdx+1} / {STAGES.length})
        </div>
        <div style={{ display:"flex", gap:4 }}>
          {STAGES.map((s, i) => (
            <div key={s.id} title={s.label} style={{
              flex:1, height:4, borderRadius:2,
              background: i <= stageIdx ? s.color : "rgba(255,255,255,0.05)",
              boxShadow: i === stageIdx ? `0 0 8px ${s.color}` : "none",
              transition:"all 0.3s",
            }} />
          ))}
        </div>
        <div style={{ display:"flex", justifyContent:"space-between", marginTop:5 }}>
          <span style={{ fontSize:9, color:C.textDim }}>App / Docs</span>
          <span style={{ fontSize:9, color:C.textDim }}>Funded</span>
        </div>
      </div>

      <div style={{ display:"flex", gap:8 }}>
        {stageIdx > 0              && <ActionBtn label="← Move Back"    onClick={() => onMove("back")} />}
        {stageIdx < STAGES.length-1 && <ActionBtn label="Advance Stage →" onClick={() => onMove("fwd")}  accent />}
        <ActionBtn label="Delete" onClick={onDelete} danger />
      </div>
    </div>
  );
}

function InfoRow({ label, value, color, note, span }) {
  return (
    <div style={{ gridColumn: span ? "1 / -1" : undefined }}>
      <div style={{ fontSize:9, color:C.textDim, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:4 }}>{label}</div>
      <div style={{ fontSize:13, fontWeight:600, color:color||"#c8dff5", lineHeight:1.4 }}>
        {value}
        {note && <span style={{ fontSize:10, color:C.textDim, marginLeft:6 }}>({note})</span>}
      </div>
    </div>
  );
}

function ActionBtn({ label, onClick, accent, danger }) {
  const [hov, setHov] = useState(false);
  return (
    <button onClick={onClick}
      onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}
      style={{
        flex: danger ? 0 : 1,
        padding: danger ? "10px 14px" : "10px",
        borderRadius:8, fontSize:12, fontWeight:700,
        cursor:"pointer", transition:"all 0.15s", letterSpacing:"0.04em",
        color:   danger ? C.red : accent ? C.accent : C.textSub,
        background: danger ? (hov?"rgba(239,68,68,0.18)":"rgba(239,68,68,0.08)") : accent ? (hov?"rgba(0,200,255,0.22)":"rgba(0,200,255,0.1)") : (hov?"rgba(255,255,255,0.07)":"rgba(255,255,255,0.03)"),
        border: `1px solid ${danger ? "rgba(239,68,68,0.3)" : accent ? "rgba(0,200,255,0.3)" : "rgba(255,255,255,0.08)"}`,
      }}>{label}</button>
  );
}

function AddPanel({ onAdd, onClose }) {
  const [form, setForm] = useState({
    name:"", loanAmount:"", loanType:"Conventional",
    propertyAddress:"", rateLocked:false,
    stage:"app-docs", closingDate:"", lo:"",
  });
  const set   = (k, v) => setForm(p => ({ ...p, [k]: v }));
  const valid = form.name.trim() && form.loanAmount;

  return (
    <div>
      <button onClick={onClose} style={{ position:"absolute", top:14, right:16, background:"none", border:"none", color:C.textDim, cursor:"pointer", fontSize:22 }}>×</button>
      <div style={{ fontSize:11, fontWeight:800, letterSpacing:"0.18em", textTransform:"uppercase", color:C.accent, marginBottom:22 }}>New Client File</div>

      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <Field label="Borrower Name">
          <input style={inputSt} value={form.name} onChange={e => set("name", e.target.value)} placeholder="Full Name" />
        </Field>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
          <Field label="Loan Amount">
            <input style={inputSt} type="number" value={form.loanAmount} onChange={e => set("loanAmount", e.target.value)} placeholder="450000" />
          </Field>
          <Field label="Loan Type">
            <select style={{ ...inputSt, cursor:"pointer" }} value={form.loanType} onChange={e => set("loanType", e.target.value)}>
              {LOAN_TYPES.map(t => <option key={t}>{t}</option>)}
            </select>
          </Field>
        </div>

        <Field label="Property Address">
          <input style={inputSt} value={form.propertyAddress} onChange={e => set("propertyAddress", e.target.value)} placeholder="123 Main St, City ST" />
        </Field>

        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
          <Field label="Stage">
            <select style={{ ...inputSt, cursor:"pointer" }} value={form.stage} onChange={e => set("stage", e.target.value)}>
              {STAGES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
            </select>
          </Field>
          <Field label="Closing Date">
            <input style={inputSt} type="date" value={form.closingDate} onChange={e => set("closingDate", e.target.value)} />
          </Field>
        </div>

        <Field label="Loan Officer">
          <input style={inputSt} value={form.lo} onChange={e => set("lo", e.target.value)} placeholder="Name" />
        </Field>

        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <div onClick={() => set("rateLocked", !form.rateLocked)} style={{
            width:38, height:21, borderRadius:11, cursor:"pointer", position:"relative",
            background: form.rateLocked ? C.green : "rgba(255,255,255,0.08)",
            border:`1px solid ${form.rateLocked ? C.green : "rgba(255,255,255,0.1)"}`,
            boxShadow: form.rateLocked ? "0 0 10px rgba(16,185,129,0.3)" : "none",
            transition:"all 0.2s",
          }}>
            <div style={{
              position:"absolute", top:2, width:15, height:15, borderRadius:"50%",
              background:"white", transition:"all 0.18s", boxShadow:"0 1px 3px rgba(0,0,0,0.3)",
              left: form.rateLocked ? 19 : 2,
            }} />
          </div>
          <span style={{ fontSize:12, fontWeight:600, color: form.rateLocked ? C.green : C.textDim, transition:"color 0.2s" }}>Rate Locked</span>
        </div>

        <div style={{ display:"flex", gap:8, marginTop:4 }}>
          <button onClick={onClose} style={{ flex:1, padding:"11px", background:"rgba(255,255,255,0.03)", border:`1px solid ${C.border}`, borderRadius:8, color:C.textDim, fontSize:12, cursor:"pointer" }}>Cancel</button>
          <button onClick={() => valid && onAdd(form)} style={{
            flex:2, padding:"11px", borderRadius:8,
            fontSize:12, fontWeight:800, letterSpacing:"0.1em", textTransform:"uppercase",
            cursor: valid ? "pointer" : "default", transition:"all 0.15s",
            color:   valid ? C.accent : C.textDim,
            background: valid ? "rgba(0,200,255,0.12)" : "rgba(255,255,255,0.03)",
            border:`1px solid ${valid ? "rgba(0,200,255,0.3)" : C.border}`,
          }}>Create File →</button>
        </div>
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return (
    <div>
      <div style={{ fontSize:9, color:C.textDim, letterSpacing:"0.12em", textTransform:"uppercase", marginBottom:6 }}>{label}</div>
      {children}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
